name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-gi gir1.2-gstreamer-1.0 \
            gstreamer1.0-plugins-bad libgirepository1.0-dev \
          || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check --output-format=github --target-version py310 .

      - name: Syntax check
        run: |
          for f in *.py; do
            python -m py_compile "$f"
            echo "  ✓ $f"
          done
